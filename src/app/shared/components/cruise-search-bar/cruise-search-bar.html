<div class="search-bar">
  <div class="form-group">
    <label>Destination</label>
    <select [(ngModel)]="selectedDestination">
      <option value="">Any</option>
      <option *ngFor="let d of destinations" [value]="d">{{ d }}</option>
    </select>
  </div>

  <div class="form-group">
    <label>Port</label>
    <select [(ngModel)]="selectedPort">
      <option value="">Any</option>
      <option *ngFor="let p of ports" [value]="p">{{ p }}</option>
    </select>
  </div>

  <div class="form-group">
    <label>Month</label>
    <select [(ngModel)]="selectedMonth">
      <option value="">Any</option>
      <option *ngFor="let m of months" [value]="m">{{ m }}</option>
    </select>
  </div>

  <div class="form-group">
    <label>Nights</label>
    <select [(ngModel)]="selectedNights">
      <option [value]="null">Any</option>
      <option *ngFor="let n of nights" [value]="n">{{ n }}</option>
    </select>
  </div>

  <button (click)="search()">Search Cruises</button>
</div>
