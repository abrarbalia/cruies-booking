<div class="dashboard-container">

  <section class="stats-cards" *ngIf="!loading">
    <app-stats-cards
      [totalCruises]="totalCruises"
      [totalUsers]="totalUsers"
      [totalBookings]="totalBookings"
      [totalRevenue]="totalRevenue">
    </app-stats-cards>
  </section>

  <section class="dashboard-widgets" *ngIf="!loading">

    <div class="widget">
      <app-recent-bookings></app-recent-bookings>
    </div>

    <div class="widget">
      <app-cruise-status></app-cruise-status>
    </div>

    <div class="widget">
      <app-checkin-summary></app-checkin-summary>
    </div>

  </section>

  <div *ngIf="loading" class="loading">Loading dashboard...</div>

</div>
