<section class="promo-hero">
  <img
    src="https://cordelia-cms-prod.s3.ap-south-1.amazonaws.com/sailnow_paylater_midscroll_banner_mobile_7e4986c96a.webp"
    alt="Sail Now Pay Later" />
</section>

<section class="offer-section">
  <h2>Cruise Deals Worth Dropping Anchor For</h2>
  <p class="subtitle">Discover exclusive fares and limited-time deals.</p>

  <div class="carousel-wrapper">

    <button class="nav-arrow left" (click)="scrollLeft(carousel)">❮</button>

    <div class="card-row scroll" #carousel>

      <div class="offer-card" *ngFor="let offer of offers">
        <img [src]="offer.image || 'https://via.placeholder.com/252x180'" />

        <div class="card-info">
          <h3>{{ offer.title }}</h3>

          <p *ngIf="offer.description">
            {{ offer.description }}
          </p>

          <p *ngIf="offer.couponCode">
            Coupon: <strong>{{ offer.couponCode }}</strong>
          </p>

          <button (click)="copyCoupon(offer.couponCode)">Copy</button>
        </div>
       
      </div>

    </div>

    <button class="nav-arrow right" (click)="scrollRight(carousel)">❯</button>

  </div>
</section>
