<!-- =========================
   OFFERS SECTION WITH SWIPER
========================= -->
<section class="offer-section">
  <h2>Cruise Deals Worth Dropping Anchor For</h2>
  <p class="subtitle">Discover exclusive fares and limited-time deals.</p>

  <div class="carousel-wrapper">
    <button class="nav-arrow left" (click)="scrollLeft()">❮</button>

    <div class="card-row scroll" #carousel>

      <!-- EXISTING OFFERS -->
      <div class="offer-card">
        <img src="https://th.bing.com/th/id/OIP.9nTGz-H3eNgUBruZiX1zbwHaD4?w=252&h=180">
        <div class="card-info">
          <h3>2nd Guest Free</h3>
          <button>View Details</button>
        </div>
      </div>

      <div class="offer-card">
        <img src="https://www.cruiseguru.com.au/cgcontent/uploads/2024/02/Thumbnail_CEL_AUNZ_Upto40Off.jpg">
        <div class="card-info">
          <h3>Flat 40% Off</h3>
          <button>View Details</button>
        </div>
      </div>

      <!-- NEW OFFERS -->
      <div class="offer-card">
        <img src="https://images.unsplash.com/photo-1510626176961-4b57d4fbad03">
        <div class="card-info">
          <h3>Free Beverages</h3>
          <p>Unlimited soft drinks & mocktails</p>
          <button>View Details</button>
        </div>
      </div>

      <div class="offer-card">
        <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267">
        <div class="card-info">
          <h3>Free Wi-Fi</h3>
          <p>Stay connected at sea</p>
          <button>View Details</button>
        </div>
      </div>

      <div class="offer-card">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
        <div class="card-info">
          <h3>Onboard Credits</h3>
          <p>₹5,000 to spend onboard</p>
          <button>View Details</button>
        </div>
      </div>

    </div>

    <button class="nav-arrow right" (click)="scrollRight()">❯</button>
  </div>
</section>
