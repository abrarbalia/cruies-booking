<div class="cruise-row">

  <!-- LEFT IMAGE -->
  <div class="cruise-img">
    <img [src]="image" alt="cruise">
    <div class="ship-badge">🚢 EMPRESS</div>
  </div>

  <!-- CENTER DETAILS -->
  <div class="cruise-details">
    <h3>{{title}}</h3>

    <div class="date-route">
      {{date}}  ➜  {{route}}
    </div>

   

  </div>

  <!-- RIGHT PRICE -->
  <div class="cruise-price-box">

    

    <div class="emi">
      No-Cost EMI starts at
      <div class="price">{{price}} <span>/month</span></div>
    </div>

    <button class="book-btn">Book Now</button>
    <button class="view-btn">View Itinerary</button>

  </div>

</div>
