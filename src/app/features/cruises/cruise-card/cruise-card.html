<div class="cruise-card">

  <img [src]="image" alt="cruise">

  <div class="cruise-info">
    
    <div>
      <div class="cruise-title">{{title}}</div>
      <div class="cruise-date">{{date}}</div>
      <div class="cruise-route">{{route}}</div>
    </div>

    <div class="price-row">
      <div class="cruise-price">
        {{price}} <span>/month</span>
      </div>

      <div class="btn-group">
        <button class="book-btn">Book Now</button>
        <button class="view-btn">View</button>
      </div>
    </div>

  </div>

</div>
