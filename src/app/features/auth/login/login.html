<section class="auth-wrapper">
  <div class="auth-card">
    <h2>Login</h2>
    <p class="subtitle">Login to continue your cruise booking</p>

    <input
      type="email"
      placeholder="Email"
      [value]="email()"
      (input)="email.set($any($event.target).value)"
      autocomplete="off"
    />

    <input
      type="password"
      placeholder="Password"
      [value]="password()"
      (input)="password.set($any($event.target).value)"
      autocomplete="current-password"
    />

    <button (click)="login()" [disabled]="loading()">
      {{ loading() ? 'Logging in...' : 'Login' }}
    </button>

    <p class="auth-link">
      Don’t have an account?
      <a routerLink="/signin">Create Account</a>
    </p>
  </div>
</section>
