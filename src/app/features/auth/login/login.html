<section class="auth-wrapper">
  <div class="auth-container">
    
    <div class="auth-visual">
      <div class="visual-overlay"></div>
      <div class="overlay-content">
        <span class="badge">Exclusive Getaways</span>
        <h1>Experience the <br> Blue Horizon</h1>
        <p>Book your cabin today and set sail into the sunset with world-class amenities.</p>
      </div>
    </div>

    <div class="auth-content">
      <div class="auth-card">
        <div class="logo-placeholder">🚢</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your cruise dashboard</p>

        <div class="form-group">
          <input
            type="email"
            placeholder="Email address"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            autocomplete="off"
          />
          <input
            type="password"
            placeholder="Password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            autocomplete="current-password"
          />
        </div>

        <button (click)="login()" [disabled]="loading()" class="btn-primary">
          {{ loading() ? 'Verifying...' : 'Sign In' }}
        </button>

        <p class="auth-link">
          New to our fleet?
          <a routerLink="/signin">Create Account</a>
        </p>
      </div>
    </div>

  </div>
</section>
