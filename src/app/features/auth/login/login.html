<section class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-visual">
      <div class="overlay-content">
        <h1>Set Sail on Your Next Adventure</h1>
        <p>Luxury cruises tailored to your lifestyle.</p>
      </div>
      <video autoplay muted loop playsinline class="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-luxury-yacht-on-the-ocean-1522-large.mp4" type="video/mp4">
      </video>
    </div>

    <div class="auth-content">
      <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue your cruise booking</p>

        <div class="input-group">
          <input
            type="email"
            placeholder="Email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            autocomplete="off"
          />
          <input
            type="password"
            placeholder="Password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            autocomplete="current-password"
          />
        </div>

        <button (click)="login()" [disabled]="loading()" class="btn-primary">
          {{ loading() ? 'Logging in...' : 'Sign In' }}
        </button>

        <p class="auth-link">
          Don’t have an account?
          <a routerLink="/signin">Create Account</a>
        </p>
      </div>
    </div>
  </div>
</section>
